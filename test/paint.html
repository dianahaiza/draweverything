<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Paint App with Undo/Redo</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #f0f0f0;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }
    #toolbar {
      margin-bottom: 10px;
    }
    canvas {
      border: 2px solid black;
      background: white;
      cursor: crosshair;
    }
    button, input {
      margin: 0 5px;
      padding: 5px 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    🎨 Color: <input type="color" id="colorPicker" value="#000000">
    ✏️ Size: <input type="range" id="brushSize" min="1" max="30" value="3">
    <button id="eraserBtn">Eraser</button>
    <button id="undoBtn">Undo</button>
    <button id="redoBtn">Redo</button>
    <button id="clearBtn">Clear</button>
    <button id="saveBtn">Save</button>
  </div>

  <canvas id="drawingCanvas" width="800" height="600"></canvas>

  <script>
    const canvas = document.getElementById("drawingCanvas");
    const ctx = canvas.getContext("2d");

    let isDrawing = false;
    let x = 0, y = 0;

    // History stacks
    let undoStack = [];
    let redoStack = [];

    // Default brush settings
    ctx.strokeStyle = "#000000";
    ctx.lineWidth = 3;
    ctx.lineCap = "round";

    function saveState(stack, keepRedo = false) {
      if (!keepRedo) redoStack = []; // clear redo if new action
      stack.push(canvas.toDataURL());
    }

    function restoreState(stack, oppositeStack) {
      if (stack.length) {
        saveState(oppositeStack, true); // save current before restoring
        const imgData = stack.pop();
        let img = new Image();
        img.src = imgData;
        img.onload = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0);
        };
      }
    }

    // Start drawing
    canvas.addEventListener("mousedown", e => {
      saveState(undoStack); // save before drawing
      x = e.offsetX;
      y = e.offsetY;
      isDrawing = true;
    });

    // Draw as mouse moves
    canvas.addEventListener("mousemove", e => {
      if (isDrawing) {
        drawLine(x, y, e.offsetX, e.offsetY);
        x = e.offsetX;
        y = e.offsetY;
      }
    });

    // Stop drawing
    canvas.addEventListener("mouseup", () => isDrawing = false);
    canvas.addEventListener("mouseleave", () => isDrawing = false);

    function drawLine(x1, y1, x2, y2) {
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
      ctx.closePath();
    }

    // Tool controls
    document.getElementById("colorPicker").addEventListener("input", e => {
      ctx.strokeStyle = e.target.value;
    });

    document.getElementById("brushSize").addEventListener("input", e => {
      ctx.lineWidth = e.target.value;
    });

    document.getElementById("eraserBtn").addEventListener("click", () => {
      ctx.strokeStyle = "white"; // Erase by drawing white
    });

    document.getElementById("clearBtn").addEventListener("click", () => {
      saveState(undoStack);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    });

    document.getElementById("saveBtn").addEventListener("click", () => {
      const link = document.createElement("a");
      link.download = "drawing.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    });

    // Undo / Redo
    document.getElementById("undoBtn").addEventListener("click", () => {
      restoreState(undoStack, redoStack);
    });

    document.getElementById("redoBtn").addEventListener("click", () => {
      restoreState(redoStack, undoStack);
    });
  </script>
</body>
</html>
