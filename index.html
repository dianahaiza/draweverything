<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DrawEverything</title>
  <!-- Bootstrap CSS -->
  <link href="css/main.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link href="styles.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-topmenu px-3 custom-navbar">
  <div class="container-fluid">

    <!-- Left side buttons -->
    <div class="menu-left">
      <button class="btn btn-altlight fw-bold shadow" id="openBtn">Open</button>
      <button class="btn btn-altlight fw-bold shadow" id="newBtn">New</button>
      <button class="btn btn-light shadow" id="undoBtn"><i class="bi bi-arrow-counterclockwise"></i></button>
      <button class="btn btn-light shadow" id="redoBtn"><i class="bi bi-arrow-clockwise"></i></button>
    </div>

    <!-- Center brand - hidden on small screens -->
    <div class="navbar-brand position-absolute start-50 translate-middle-x fw-bold fs-4 d-none d-lg-block text-altmain">
      DrawEverything
      <i class="bi bi-brush-fill text-altmain"></i>
    </div>

    <!-- Right side buttons -->
    <div class="menu-right">
      <button class="btn btn-altmain fw-bold shadow"id="saveBtn">Save</button>
    </div>

  </div>
</nav>

<input type="file" id="openFileInput" accept="image/*" style="display: none;">

<!-- Layout with sidebar + drawing area -->
<div class="main-layout">
  <div class="row">
    <!-- Left sidebar tools -->
    <div class="tool-sidebar">
      <div class="tool-grid">
        <button class="tool-btn" data-tool="brush" title="Brush"><i class="bi bi-brush"></i></button>
        <button class="tool-btn" data-tool="eraser" title="Eraser"><i class="bi bi-eraser"></i></button>
        <button class="tool-btn" data-tool="text" title="Text"><i class="bi bi-type"></i></button>
        <button class="tool-btn" data-tool="fill" title="Fill"><i class="bi bi-paint-bucket"></i></button>
        <button class="tool-btn" data-tool="line" title="Line"><i class="bi bi-slash-lg"></i></button>
        <button class="tool-btn" data-tool="rect" title="Rectangle"><i class="bi bi-square"></i></button>
        <button class="tool-btn" data-tool="circle" title="Circle"><i class="bi bi-circle"></i></button>
        <button class="tool-btn" data-tool="triangle" title="Triangle"><i class="bi bi-triangle"></i></button>
        <button class="tool-btn" data-tool="star" title="Star"><i class="bi bi-star"></i></button>
        <button class="tool-btn" data-tool="arrow" title="Arrow"><i class="bi bi-arrow-up-right"></i></button>
        <button class="tool-btn" data-tool="hand" title="Hand"><i class="bi bi-hand-index"></i></button>
        <button class="tool-btn" data-tool="clear" title="Clear"><i class="bi bi-trash"></i></button>
      </div>
    </div>

    <!-- Drawing canvas area -->
    <div class="drawing-area">
      <div class="canvas-container" id="canvasContainer">
        <canvas id="drawCanvas"></canvas>
        <canvas id="tempCanvas"></canvas>
      </div>
    </div>
  </div>
</div>

<!-- Bottom Bar -->
<div class="bottom-bar px-3">
  <div class="container-fluid d-flex align-items-center justify-content-between">
    
    <!-- Left side: Color + Brush size controls -->
    <div class="d-flex align-items-center">
      <!-- Color Picker -->
      <input type="color" class="form-control form-control-color color-picker me-2" value="#000000">

      <!-- Brush size input -->
      <input type="number" class="form-control size-input me-1" value="5" min="1">

      <!-- px label -->
      <span class="me-2">px</span>

      <!-- Size adjust buttons -->
      <button class="btn btn-outline-secondary me-1">-</button>
      <button class="btn btn-outline-secondary">+</button>
    </div>

    <!-- Right side: Zoom slider -->
    <div class="d-flex align-items-center">
      <span class="me-2">Zoom</span>
      <input type="range" id="zoomRange" class="form-range zoom-slider" min="10" max="200" value="100">
      <output for="zoomRange" id="output"></output>
    </div>

  </div>
</div>

<!-- New Drawing Confirmation Modal -->
<div class="modal fade" id="newDrawingModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Start New Drawing</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="newModalBody">
        <!-- Filled dynamically depending on save state -->
      </div>
      <div class="modal-footer" id="newModalFooter">
        <!-- Buttons injected dynamically -->
      </div>
    </div>
  </div>
</div>


<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
